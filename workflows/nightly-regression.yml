name: Nightly Regression

on:
  schedule:
    - cron: '0 2 * * 1-5'  # Weekdays at 2 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging

jobs:
  regression-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: mcr.microsoft.com/playwright/java:v1.47.0-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run web regression suite
        run: |
          mvn -pl cashi-web -am verify \
            -Dtest.tags="regression & web" \
            -Denv=${{ github.event.inputs.environment || 'staging' }} \
            -Djunit.jupiter.execution.parallel.config.fixed.parallelism=4

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web
          path: cashi-web/target/allure-results
          retention-days: 30

  regression-mobile:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create and start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: echo "Emulator started"

      - name: Start Appium server
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium &
          sleep 10

      - name: Run mobile regression suite
        run: |
          mvn -pl cashi-mobile -am verify \
            -Dtest.tags="regression & mobile" \
            -Denv=${{ github.event.inputs.environment || 'staging' }} \
            -Ddevice.provider=local \
            -Dcaps.file=android-emulator.json

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: cashi-mobile/target/allure-results
          retention-days: 30

  publish-report:
    needs: [regression-web, regression-mobile]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download web results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-web
          path: allure-results/web

      - name: Download mobile results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-mobile
          path: allure-results/mobile

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.zip -o allure.zip
          unzip -q allure.zip -d /opt
          echo "/opt/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
