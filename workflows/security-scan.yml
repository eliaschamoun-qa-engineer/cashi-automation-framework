name: Security Scan

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 4 AM UTC
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 90

  zap-dast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare ZAP reports directory
        run: mkdir -p infrastructure/zap-reports

      - name: Run ZAP DAST scan
        run: |
          docker compose -f infrastructure/docker-compose.zap.yml up --abort-on-container-exit

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: infrastructure/zap-reports/
          retention-days: 90

  security-functional-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run security test suite (web)
        run: |
          mvn -pl cashi-web -am verify \
            -Dtest.tags="security & web" \
            -Denv=staging

      - name: Run security test suite (mobile)
        run: |
          mvn -pl cashi-mobile -am verify \
            -Dtest.tags="security & mobile" \
            -Denv=staging

      - name: Upload Security Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: |
            cashi-web/target/allure-results
            cashi-mobile/target/allure-results
          retention-days: 90
