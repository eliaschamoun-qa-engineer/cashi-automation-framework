name: PR Smoke Tests

on:
  pull_request:
    branches: [main, develop]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run smoke tests (web)
        run: |
          mvn -pl cashi-web -am verify \
            -Dtest.tags="smoke & web" \
            -Denv=dev \
            -Dfailsafe.rerunFailingTestsCount=1

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.zip -o allure.zip
          unzip -q allure.zip -d /opt
          echo "/opt/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: allure generate cashi-web/target/allure-results -o allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pr-${{ github.event.pull_request.number }}
          path: allure-report
          retention-days: 14
